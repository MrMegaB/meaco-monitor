name: Meaco Stock Monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub minimum) this is minimum
  workflow_dispatch:          # lets you trigger it manually from the Actions tab
    inputs:
      test_email:
        description: "Send a test email? (yes/no)"
        required: false
        default: "no"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore state file
        uses: actions/cache@v4
        with:
          path: meaco_stock_state.json
          key: meaco-state-${{ github.run_id }}
          restore-keys: meaco-state-

      - name: Run monitor
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: |
          if [ "${{ github.event.inputs.test_email }}" = "yes" ]; then
            python3 meaco_stock_monitor.py --test-email
          else
            python3 meaco_stock_monitor.py
          fi
